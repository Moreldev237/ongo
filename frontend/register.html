<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVENOW - Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center py-12">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-3xl mx-auto mb-4">M</div>
            <h1 class="text-3xl font-bold text-gray-900">MOVENOW</h1>
            <p class="text-gray-600 mt-2">Créer un nouveau compte</p>
        </div>

        <!-- Register Form -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">S'inscrire</h2>
            
            <form id="registerForm" class="space-y-4">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="votre@email.com">
                </div>

                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="nom_utilisateur">
                </div>

                <!-- Phone -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
                    <input type="tel" id="phone" name="phone" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="+33 6 XX XX XX XX">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="••••••••">
                    <p class="text-xs text-gray-500 mt-1">Au moins 8 caractères</p>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="passwordConfirm" class="block text-sm font-medium text-gray-700 mb-1">Confirmer mot de passe</label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="••••••••">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full mt-6 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-medium transition">
                    S'inscrire
                </button>
            </form>

            <!-- Error Message -->
            <div id="errorMessage" class="mt-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg hidden"></div>

            <!-- Success Message -->
            <div id="successMessage" class="mt-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg hidden"></div>

            <!-- Links -->
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Déjà un compte ? 
                    <a href="login.html" class="text-blue-600 hover:text-blue-800 font-medium">Se connecter</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-600 text-sm mt-8">
            © 2026 MOVENOW. Tous droits réservés.
        </p>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            
            if (password !== passwordConfirm) {
                document.getElementById('errorMessage').textContent = 'Les mots de passe ne correspondent pas';
                document.getElementById('errorMessage').classList.remove('hidden');
                return;
            }
            
            await AUTH.register({
                email: document.getElementById('email').value,
                username: document.getElementById('username').value,
                phone: document.getElementById('phone').value,
                password: password
            });
        });
    </script>
</body>
</html>
