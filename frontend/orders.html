<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVENOW - Mes Commandes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">M</div>
                <span class="text-2xl font-bold text-blue-600">MOVENOW</span>
            </div>
            <ul class="flex gap-6 items-center">
                <li><a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">Accueil</a></li>
                <li><a href="orders.html" class="text-gray-700 hover:text-blue-600 font-medium active">Commandes</a></li>
                <li><a href="promotions.html" class="text-gray-700 hover:text-blue-600 font-medium">Promotions</a></li>
                <li><a href="create-order.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-medium">Nouvelle Commande</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Mes Commandes</h1>
            <p class="text-gray-600">Consultez l'historique et le statut de vos commandes</p>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Statut</label>
                    <select id="filter-status" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">Tous les statuts</option>
                        <option value="pending">En Attente</option>
                        <option value="accepted">Acceptée</option>
                        <option value="in_progress">En Cours</option>
                        <option value="completed">Complétée</option>
                        <option value="cancelled">Annulée</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Type de Véhicule</label>
                    <select id="filter-vehicle" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">Tous les véhicules</option>
                        <option value="scooter">Scooter</option>
                        <option value="bike">Vélo</option>
                        <option value="car">Voiture</option>
                        <option value="truck">Camion</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Ordre</label>
                    <select id="filter-sort" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="recent">Plus récente</option>
                        <option value="oldest">Plus ancienne</option>
                        <option value="price_high">Prix plus élevé</option>
                        <option value="price_low">Prix plus bas</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="filter-btn" class="w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-medium">Filtrer</button>
                </div>
            </div>
        </div>

        <!-- Orders List -->
        <div class="space-y-4">
            <div id="orders-container" class="space-y-4">
                <div class="bg-white rounded-lg shadow p-8 text-center">
                    <p class="text-gray-500">Chargement des commandes...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Order Details -->
    <div id="order-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-lg max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-900">Détails de la Commande</h2>
                <button onclick="closeOrderModal()" class="text-gray-500 hover:text-gray-700">✕</button>
            </div>
            <div id="modal-content" class="p-6">
                <!-- Will be filled by JavaScript -->
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/orders.js"></script>
</body>
</html>
