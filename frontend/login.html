<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVENOW - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-3xl mx-auto mb-4">M</div>
            <h1 class="text-3xl font-bold text-gray-900">MOVENOW</h1>
            <p class="text-gray-600 mt-2">Plateforme de transport collaborative</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Se connecter</h2>
            
            <form id="loginForm" class="space-y-4">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="votre@email.com">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="••••••••">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full mt-6 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-medium transition">
                    Connexion
                </button>
            </form>

            <!-- Error Message -->
            <div id="errorMessage" class="mt-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg hidden"></div>

            <!-- Success Message -->
            <div id="successMessage" class="mt-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg hidden"></div>

            <!-- Links -->
            <div class="mt-6 space-y-2 text-center">
                <p class="text-gray-600">
                    Pas de compte ? 
                    <a href="register.html" class="text-blue-600 hover:text-blue-800 font-medium">S'inscrire</a>
                </p>
                <p class="text-gray-600">
                    <a href="forgot-password.html" class="text-blue-600 hover:text-blue-800 font-medium">Mot de passe oublié</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-600 text-sm mt-8">
            © 2026 MOVENOW. Tous droits réservés.
        </p>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await AUTH.login({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
        });
    </script>
</body>
</html>
